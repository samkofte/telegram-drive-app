<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Account Settings</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3e577a",
                        "primary-dark": "#2c3e56",
                        "background-light": "#f9fafb",
                        "background-dark": "#1f2938",
                        "surface-light": "#ffffff",
                        "surface-dark": "#111827", // Darker shade for cards in dark mode
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02)',
                        'inner-light': 'inset 0 2px 4px 0 rgba(0, 0, 0, 0.05)',
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        
        /* Custom Range Input for Storage Gauge visualization */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 0;
            width: 0;
        }
        
        /* Hide scrollbar for horizontal tabs */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-gray-900 dark:text-gray-100 antialiased min-h-screen flex flex-col transition-colors duration-300">
<!-- Top Navigation -->
<header class="sticky top-0 z-40 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-700">
<div class="flex items-center justify-between p-4 pb-3">
<button class="flex items-center justify-center p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors text-gray-900 dark:text-white group">
<span class="material-symbols-outlined group-hover:-translate-x-0.5 transition-transform">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight text-gray-900 dark:text-white">Settings</h1>
<button class="text-sm font-semibold text-primary dark:text-blue-300 hover:opacity-80">Done</button>
</div>
<!-- Mobile "Vertical" Tabs as Horizontal Pills -->
<div class="px-4 pb-3">
<div class="flex space-x-1 bg-gray-200/50 dark:bg-gray-700/50 p-1 rounded-xl overflow-x-auto no-scrollbar">
<button class="flex-1 min-w-[80px] py-1.5 px-3 rounded-lg bg-white dark:bg-surface-dark shadow-sm text-sm font-semibold text-primary dark:text-blue-300 text-center transition-all">Profile</button>
<button class="flex-1 min-w-[80px] py-1.5 px-3 rounded-lg text-sm font-medium text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-600/50 text-center transition-all">Billing</button>
<button class="flex-1 min-w-[80px] py-1.5 px-3 rounded-lg text-sm font-medium text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-600/50 text-center transition-all">Team</button>
<button class="flex-1 min-w-[80px] py-1.5 px-3 rounded-lg text-sm font-medium text-gray-500 dark:text-gray-400 hover:bg-white/50 dark:hover:bg-gray-600/50 text-center transition-all">Integrations</button>
</div>
</div>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-md mx-auto p-4 flex flex-col gap-6">
<!-- Profile Picture Section -->
<div class="flex flex-col items-center justify-center pt-2">
<div class="relative group cursor-pointer">
<div class="w-28 h-28 rounded-full border-4 border-white dark:border-surface-dark shadow-lg bg-cover bg-center overflow-hidden" data-alt="Portrait of a young professional woman with a neutral background" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDCJF82GAyrdb0aM_-raosTwWdNkcaLt4eCiK0xZ4NYhUazcS2SlMrG-YjqZZ1p_YK90ZFZ4egHU6pY8x137119_Iu-rA6WhtPYTJE-_i9Q6jkRl7XCE7wbCfmQmbjYPNHObSoSS5dW8dn7IQPAzwva3hWIY-AHrPjwYpX92n_G78mYcmsj3jfuS0_0mAlSM1IGASG7J6iIBtNFd2bijvyEs1mGTyQfqn5aCCwzcRbHEKi_lfXMzafkeapvAOu2KV_FDZAfLA3wUmM');">
</div>
<div class="absolute bottom-0 right-0 bg-primary text-white p-2 rounded-full shadow-md border-2 border-white dark:border-surface-dark flex items-center justify-center hover:bg-primary-dark transition-colors">
<span class="material-symbols-outlined text-[18px]">photo_camera</span>
</div>
</div>
<p class="mt-3 text-sm text-primary font-medium dark:text-blue-300">Change Photo</p>
</div>
<!-- Form Fields -->
<div class="space-y-4">
<div class="group">
<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Full Name</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-gray-400 pointer-events-none">person</span>
<input class="w-full bg-surface-light dark:bg-surface-dark border-none ring-1 ring-gray-200 dark:ring-gray-700 text-gray-900 dark:text-white rounded-xl py-3.5 pl-11 pr-4 focus:ring-2 focus:ring-primary dark:focus:ring-blue-500 shadow-soft transition-all placeholder-gray-400 font-medium" placeholder="Your full name" type="text" value="Alex Johnson"/>
</div>
</div>
<div class="group">
<label class="block text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1.5 ml-1">Email Address</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-4 text-gray-400 pointer-events-none">mail</span>
<input class="w-full bg-surface-light dark:bg-surface-dark border-none ring-1 ring-gray-200 dark:ring-gray-700 text-gray-900 dark:text-white rounded-xl py-3.5 pl-11 pr-4 focus:ring-2 focus:ring-primary dark:focus:ring-blue-500 shadow-soft transition-all placeholder-gray-400 font-medium" placeholder="name@example.com" type="email" value="alex.j@company.com"/>
</div>
</div>
</div>
<!-- Storage Card -->
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl p-5 shadow-soft ring-1 ring-gray-100 dark:ring-gray-800 relative overflow-hidden">
<!-- Decorative background element -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl"></div>
<div class="flex items-center justify-between mb-4 relative z-10">
<div class="flex items-center gap-2">
<div class="p-2 bg-blue-50 dark:bg-blue-900/30 rounded-lg text-primary dark:text-blue-300">
<span class="material-symbols-outlined">cloud</span>
</div>
<div>
<h3 class="font-bold text-gray-900 dark:text-white leading-tight">Storage</h3>
<p class="text-xs text-gray-500 dark:text-gray-400">Personal Plan</p>
</div>
</div>
<span class="bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs font-bold px-2 py-1 rounded-md">PRO</span>
</div>
<div class="relative z-10">
<div class="flex justify-between text-sm font-medium mb-2">
<span class="text-gray-700 dark:text-gray-200">7.5 GB <span class="text-gray-400 font-normal">used</span></span>
<span class="text-gray-500 dark:text-gray-400">10 GB</span>
</div>
<!-- Custom Progress Bar -->
<div class="h-3 w-full bg-gray-100 dark:bg-gray-700 rounded-full overflow-hidden shadow-inner-light">
<div class="h-full bg-primary rounded-full relative" style="width: 75%">
<div class="absolute inset-0 bg-white/20 w-full h-full animate-pulse"></div>
</div>
</div>
<div class="mt-5">
<button class="w-full bg-primary hover:bg-primary-dark text-white font-semibold py-3 rounded-xl transition-all shadow-md shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">rocket_launch</span>
                        Upgrade Plan
                    </button>
</div>
</div>
</div>
<!-- Preferences Section -->
<div class="space-y-3">
<h4 class="text-sm font-semibold text-gray-500 dark:text-gray-400 px-1">PREFERENCES</h4>
<div class="bg-surface-light dark:bg-surface-dark rounded-xl shadow-soft ring-1 ring-gray-100 dark:ring-gray-800 divide-y divide-gray-100 dark:divide-gray-700/50 overflow-hidden">
<!-- Dark Mode Toggle -->
<div class="flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300">
<span class="material-symbols-outlined text-[18px]">dark_mode</span>
</div>
<span class="font-medium text-gray-900 dark:text-white">Dark Mode</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
<!-- Notifications -->
<button class="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors text-left">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300">
<span class="material-symbols-outlined text-[18px]">notifications</span>
</div>
<span class="font-medium text-gray-900 dark:text-white">Notifications</span>
</div>
<span class="material-symbols-outlined text-gray-400">chevron_right</span>
</button>
<!-- Security -->
<button class="w-full flex items-center justify-between p-4 hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors text-left">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-gray-600 dark:text-gray-300">
<span class="material-symbols-outlined text-[18px]">lock</span>
</div>
<span class="font-medium text-gray-900 dark:text-white">Security</span>
</div>
<span class="material-symbols-outlined text-gray-400">chevron_right</span>
</button>
</div>
</div>
<!-- Sign Out Button -->
<button class="mt-2 w-full py-3 text-red-500 font-medium hover:bg-red-50 dark:hover:bg-red-900/10 rounded-xl transition-colors">
            Sign Out
        </button>
<!-- Bottom Spacer for Scrolling -->
<div class="h-8"></div>
</main>
<script>
        // Simple script to toggle dark mode for demo purposes
        const toggle = document.querySelector('input[type="checkbox"]');
        const html = document.querySelector('html');
        
        toggle.addEventListener('change', () => {
            if(toggle.checked) {
                html.classList.add('dark');
            } else {
                html.classList.remove('dark');
            }
        });
    </script>
</body></html>
