<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Share Settings Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#3e577a",
                        "background-light": "#f9fafb",
                        "background-dark": "#1f2938",
                        "surface-light": "#ffffff",
                        "surface-dark": "#374151",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .ios-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .ios-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .ios-scrollbar::-webkit-scrollbar-thumb {
            background-color: rgba(156, 163, 175, 0.5);
            border-radius: 20px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-gray-900/40 flex justify-center items-end min-h-screen font-display">
<!-- Modal Container -->
<div class="relative w-full max-w-md bg-background-light dark:bg-background-dark rounded-t-[2rem] shadow-[0_-8px_30px_rgba(0,0,0,0.12)] flex flex-col max-h-[90vh] overflow-hidden transition-transform duration-300 ease-out translate-y-0">
<!-- Sheet Handle -->
<div class="flex-none pt-3 pb-2 flex justify-center w-full bg-background-light dark:bg-background-dark cursor-grab active:cursor-grabbing z-10">
<div class="h-1.5 w-12 rounded-full bg-gray-300 dark:bg-gray-600"></div>
</div>
<!-- Header -->
<div class="flex-none px-6 pb-4 flex items-center justify-between bg-background-light dark:bg-background-dark border-b border-gray-100 dark:border-gray-700">
<div>
<h3 class="text-gray-900 dark:text-white text-lg font-bold leading-tight tracking-[-0.015em]">Share File</h3>
<p class="text-sm text-gray-500 dark:text-gray-400 font-medium truncate max-w-[240px]">Project_X_Final.pdf</p>
</div>
<button class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 text-gray-500 dark:text-gray-400 transition-colors">
<span class="material-symbols-outlined text-[24px]">close</span>
</button>
</div>
<!-- Scrollable Content -->
<div class="flex-1 overflow-y-auto ios-scrollbar px-6 py-2 space-y-6 bg-background-light dark:bg-background-dark">
<!-- Invite Section -->
<div class="space-y-3 mt-2">
<div class="relative">
<div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-gray-400">person_add</span>
</div>
<input class="w-full pl-10 pr-24 py-3.5 bg-surface-light dark:bg-surface-dark border border-gray-200 dark:border-gray-600 rounded-xl text-gray-900 dark:text-white placeholder-gray-400 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all shadow-sm" placeholder="Add people, groups, or emails..." type="text"/>
<div class="absolute inset-y-1.5 right-1.5">
<select class="h-full bg-gray-100 dark:bg-gray-600 text-gray-700 dark:text-gray-200 text-xs font-semibold rounded-lg border-none px-3 py-1 cursor-pointer hover:bg-gray-200 dark:hover:bg-gray-500 transition-colors focus:ring-0">
<option>Can Edit</option>
<option>Can View</option>
<option>Can Comment</option>
</select>
</div>
</div>
<button class="w-full flex items-center justify-center gap-2 bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
<span>Send Invite</span>
<span class="material-symbols-outlined text-sm">send</span>
</button>
</div>
<!-- Access List Section -->
<div class="space-y-4">
<h2 class="text-gray-900 dark:text-white text-base font-bold leading-tight px-1">People with access</h2>
<div class="bg-surface-light dark:bg-surface-dark rounded-2xl shadow-sm border border-gray-100 dark:border-gray-700 divide-y divide-gray-50 dark:divide-gray-700 overflow-hidden">
<!-- User 1 (Owner) -->
<div class="flex items-center gap-3 p-3 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
<div class="relative">
<img alt="User Avatar" class="w-10 h-10 rounded-full object-cover border border-gray-200 dark:border-gray-600" data-alt="Profile picture of the file owner, a woman with a confident expression" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA2q5cOyOJhMqRIj-Lah6napv5SDAqAxlbFzWiMPuIa4lH0eLS3D_oCOYKMSaYbxJhYFhkijXAN0GJ1lSjGM0vkHHFXATYOnw7bR43XlpnG0z7eKWE1P-LAmMv3FJ585hLk5QfO2bztG-dyNQX6rJ5_SDt-jCEOdnNySf2llYKGS7CzMqq5a5MlZO414_Bu2uyeIleDa7tr7nBzPpa7qZff2pRPuynKBnWZulHtvgJ5H9WsT2sNC5A-2kxtNFQ3_2mIF8aJb4C_hCw"/>
<div class="absolute -bottom-0.5 -right-0.5 bg-green-500 border-2 border-white dark:border-gray-800 w-3 h-3 rounded-full"></div>
</div>
<div class="flex-1 min-w-0">
<div class="text-sm font-semibold text-gray-900 dark:text-white truncate">You</div>
<div class="text-xs text-gray-500 dark:text-gray-400 truncate">hannah.m@company.com</div>
</div>
<span class="text-xs font-medium text-gray-400 dark:text-gray-500 px-2">Owner</span>
</div>
<!-- User 2 (Editor) -->
<div class="flex items-center gap-3 p-3 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors group">
<div class="relative">
<img alt="User Avatar" class="w-10 h-10 rounded-full object-cover border border-gray-200 dark:border-gray-600" data-alt="Profile picture of a male colleague with glasses" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBG5F0O97bv6LK79fziVKlphZAMSN7NrqiFMNpvDEJhbG1tpumKzoTcwQg19RwgFcDbaCyCHtxjaiHSRmp9X2byRaV1e8-XyBxqxMjwjZCIk_pGeclZD4043Avo_5GERoBUuE9g7Foousnu6QtROSjpwkSddAg3eENb_rz5IKkRW5MlVZMf7ZBEGcz7_3-PoSOHJBo4qBoYVxJsTP4tPVncluEaOAK5X3rRxG7qWqoPBY5OyIF9rfm5xz2SM7comwGbfgu_W1C-hOY"/>
</div>
<div class="flex-1 min-w-0">
<div class="text-sm font-semibold text-gray-900 dark:text-white truncate">Sarah Jenkins</div>
<div class="text-xs text-gray-500 dark:text-gray-400 truncate">sarah.j@company.com</div>
</div>
<div class="relative">
<button class="flex items-center gap-1 text-xs font-semibold text-primary dark:text-blue-400 bg-primary/10 dark:bg-primary/20 hover:bg-primary/20 px-2.5 py-1.5 rounded-lg transition-colors">
                                Can Edit
                                <span class="material-symbols-outlined text-[14px]">expand_more</span>
</button>
</div>
</div>
<!-- User 3 (Viewer) -->
<div class="flex items-center gap-3 p-3 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors group">
<div class="flex items-center justify-center w-10 h-10 rounded-full bg-purple-100 dark:bg-purple-900/30 text-purple-600 dark:text-purple-300 border border-purple-200 dark:border-purple-800">
<span class="text-xs font-bold">DT</span>
</div>
<div class="flex-1 min-w-0">
<div class="text-sm font-semibold text-gray-900 dark:text-white truncate">Design Team</div>
<div class="text-xs text-gray-500 dark:text-gray-400 truncate">design@company.com</div>
</div>
<div class="relative">
<button class="flex items-center gap-1 text-xs font-semibold text-gray-600 dark:text-gray-300 bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 px-2.5 py-1.5 rounded-lg transition-colors">
                                Can View
                                <span class="material-symbols-outlined text-[14px]">expand_more</span>
</button>
</div>
</div>
</div>
</div>
<div class="h-4"></div> <!-- Spacer -->
</div>
<!-- Footer / Link Settings -->
<div class="flex-none p-6 bg-surface-light dark:bg-surface-dark border-t border-gray-100 dark:border-gray-700 pb-10">
<div class="flex flex-col gap-4">
<!-- General Access Status -->
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="p-1.5 bg-gray-100 dark:bg-gray-700 rounded-full">
<span class="material-symbols-outlined text-gray-500 dark:text-gray-400 text-sm">lock</span>
</div>
<div class="flex flex-col">
<span class="text-xs font-semibold text-gray-900 dark:text-white">Restricted Access</span>
<span class="text-[10px] text-gray-500 dark:text-gray-400">Only people added can open</span>
</div>
</div>
<button class="text-xs font-bold text-primary dark:text-blue-400 hover:underline">Change</button>
</div>
<!-- Copy Link & Settings Grid -->
<div class="grid grid-cols-1 gap-3">
<button class="flex items-center justify-between w-full p-3 bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-xl hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors group">
<div class="flex items-center gap-3">
<div class="bg-white dark:bg-gray-700 p-2 rounded-lg shadow-sm border border-gray-100 dark:border-gray-600 group-hover:scale-105 transition-transform">
<span class="material-symbols-outlined text-primary dark:text-blue-400 text-xl">link</span>
</div>
<div class="flex flex-col items-start">
<span class="text-sm font-bold text-gray-900 dark:text-white">Copy Link</span>
<span class="text-[10px] text-gray-500 dark:text-gray-400">https://saas.app/f/8s9d...</span>
</div>
</div>
<span class="material-symbols-outlined text-gray-400 group-hover:text-primary transition-colors">content_copy</span>
</button>
<div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-xl">
<div class="flex items-center gap-3">
<div class="bg-white dark:bg-gray-700 p-2 rounded-lg shadow-sm border border-gray-100 dark:border-gray-600">
<span class="material-symbols-outlined text-orange-500 text-xl">timer</span>
</div>
<div class="flex flex-col">
<span class="text-sm font-bold text-gray-900 dark:text-white">Link Expiration</span>
<span class="text-[10px] text-gray-500 dark:text-gray-400">Disable link after set date</span>
</div>
</div>
<!-- Toggle Switch -->
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-primary"></div>
</label>
</div>
</div>
</div>
</div>
</div>
</body></html>
