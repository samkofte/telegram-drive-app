<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login Screen</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#3e577a",
              "background-light": "#f9fafb",
              "background-dark": "#1f2938",
              "surface-light": "#ffffff",
              "surface-dark": "#374151",
            },
            fontFamily: {
              "display": ["Inter", "sans-serif"]
            },
            borderRadius: {
              "DEFAULT": "0.5rem",
              "lg": "0.75rem",
              "xl": "1rem", 
              "2xl": "1.5rem",
              "full": "9999px"
            },
            boxShadow: {
                "soft": "0 4px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px -1px rgba(0, 0, 0, 0.02), 0 10px 15px -3px rgba(0, 0, 0, 0.04)",
                "card": "0 0 0 1px rgba(0,0,0,0.03), 0 2px 8px rgba(0,0,0,0.04), 0 12px 24px rgba(0,0,0,0.04)"
            }
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-background-light dark:bg-background-dark text-[#121417] dark:text-white transition-colors duration-200 antialiased selection:bg-primary selection:text-white">
<div class="relative flex min-h-screen w-full flex-col items-center justify-center p-4 overflow-hidden">
<!-- Abstract Background Decoration for depth -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
<div class="absolute -top-[20%] -left-[10%] w-[70%] h-[70%] rounded-full bg-primary/5 blur-[120px]"></div>
<div class="absolute top-[40%] -right-[10%] w-[60%] h-[60%] rounded-full bg-blue-200/10 blur-[100px] dark:bg-blue-900/10"></div>
</div>
<!-- Main Card -->
<div class="w-full max-w-[400px] bg-surface-light dark:bg-surface-dark rounded-2xl shadow-card dark:shadow-none dark:border dark:border-gray-700 overflow-hidden relative group/card">
<!-- Header Section -->
<div class="flex flex-col items-center pt-10 pb-6 px-8">
<!-- Logo Mark -->
<div class="mb-6 relative">
<div class="h-16 w-16 bg-gradient-to-br from-primary to-[#2c3e50] rounded-xl shadow-lg flex items-center justify-center text-white transform group-hover/card:scale-105 transition-transform duration-500" data-alt="App logo placeholder">
<span class="material-symbols-outlined text-[32px]">folder_open</span>
</div>
<!-- Decorative accent dot -->
<div class="absolute -top-1 -right-1 h-4 w-4 bg-white dark:bg-surface-dark rounded-full flex items-center justify-center">
<div class="h-2.5 w-2.5 bg-green-500 rounded-full animate-pulse"></div>
</div>
</div>
<h1 class="text-2xl font-bold tracking-tight text-center text-gray-900 dark:text-white">Welcome Back</h1>
<p class="mt-2 text-sm text-center text-gray-500 dark:text-gray-400">Sign in to manage your workspace</p>
</div>
<!-- Form Section -->
<div class="px-8 pb-8">
<form class="flex flex-col gap-5" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="space-y-1.5">
<label class="text-sm font-semibold text-gray-700 dark:text-gray-200 ml-1" for="email">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full rounded-xl border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm focus:border-primary focus:ring-primary/20 pl-11 h-12 text-sm transition-all duration-200 placeholder:text-gray-400" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-semibold text-gray-700 dark:text-gray-200" for="password">Password</label>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full rounded-xl border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white shadow-sm focus:border-primary focus:ring-primary/20 pl-11 pr-10 h-12 text-sm transition-all duration-200 placeholder:text-gray-400" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 cursor-pointer focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between mt-1">
<div class="flex items-center gap-2">
<input class="h-4 w-4 rounded border-gray-300 text-primary focus:ring-primary/20 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 cursor-pointer" id="remember-me" type="checkbox"/>
<label class="text-sm text-gray-600 dark:text-gray-300 cursor-pointer select-none" for="remember-me">Remember me</label>
</div>
<a class="text-sm font-medium text-primary hover:text-primary/80 transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="mt-2 w-full flex items-center justify-center rounded-xl bg-primary text-white h-12 text-sm font-bold tracking-wide shadow-lg shadow-primary/25 hover:bg-primary/90 hover:shadow-primary/40 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary active:scale-[0.98] transition-all duration-200">
                        Log In
                    </button>
<!-- Divider -->
<div class="relative my-2">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-gray-200 dark:border-gray-700"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="bg-surface-light dark:bg-surface-dark px-2 text-gray-400 dark:text-gray-500 font-medium">Or continue with</span>
</div>
</div>
<!-- Social Login (Minimal) -->
<div class="grid grid-cols-2 gap-3">
<button class="flex items-center justify-center h-10 w-full rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors focus:ring-2 focus:ring-gray-200 dark:focus:ring-gray-600" type="button">
<!-- Google Icon SVG -->
<svg class="h-5 w-5 mr-2" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Google</span>
</button>
<button class="flex items-center justify-center h-10 w-full rounded-lg border border-gray-200 dark:border-gray-600 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors focus:ring-2 focus:ring-gray-200 dark:focus:ring-gray-600" type="button">
<!-- Apple Icon SVG -->
<svg class="h-5 w-5 mr-2 text-gray-900 dark:text-white" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.74s2.57-.99 4.31-.82c.72.03 2.81.27 4.14 2.21-3.48 2-2.92 7.08.47 8.84zM12.03 5.07c.83-1.39 2.2-1.99 2.14-3.07-1.34.09-3.06 1.05-3.9 2.45-.73 1.22-1.36 2.45.03 3.12 1.39.53 1.25-1.55 1.73-2.5z"></path>
</svg>
<span class="text-sm font-medium text-gray-700 dark:text-gray-200">Apple</span>
</button>
</div>
</form>
</div>
<!-- Bottom Accent -->
<div class="h-1.5 w-full bg-gradient-to-r from-transparent via-primary/50 to-transparent opacity-50"></div>
</div>
<!-- Footer -->
<div class="mt-8 text-center">
<p class="text-sm text-gray-600 dark:text-gray-400">
                Don't have an account? 
                <a class="font-semibold text-primary hover:text-primary/80 transition-colors" href="#">Sign up</a>
</p>
</div>
</div>
</body></html>
