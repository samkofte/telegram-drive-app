<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol - Telegram Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            padding: 3rem 2.5rem;
            text-align: center;
        }

        .auth-logo {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            display: inline-block;
        }

        .auth-title {
            font-size: 1.75rem;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 0.25rem;
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .auth-footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .success-box {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.75rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            display: none;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: left;
        }

        .loading-overlay {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            margin-top: 1rem;
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2.5px solid rgba(0, 0, 0, 0.05);
            border-top: 2.5px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .password-check {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
    </style>
</head>

<body>
    <div class="auth-card glass-pane animate-fade">
        <div class="auth-logo">🚀</div>
        <h1 class="auth-title">Aramıza Katılın</h1>
        <p class="auth-subtitle">Sınırsız depolama dünyasına ilk adımı atın</p>

        <div class="error-box" id="errorMessage"></div>
        <div class="success-box" id="successMessage"></div>

        <form id="registerForm">
            <div class="grid-inputs">
                <div class="input-group" style="text-align: left;">
                    <label class="input-label" for="firstName">Adınız</label>
                    <input type="text" id="firstName" placeholder="John" required>
                </div>
                <div class="input-group" style="text-align: left;">
                    <label class="input-label" for="lastName">Soyadınız</label>
                    <input type="text" id="lastName" placeholder="Doe" required>
                </div>
            </div>

            <div class="input-group" style="text-align: left;">
                <label class="input-label" for="username">Kullanıcı Adı</label>
                <input type="text" id="username" placeholder="johndoe" required minlength="3">
            </div>

            <div class="input-group" style="text-align: left;">
                <label class="input-label" for="email">E-posta Adresi</label>
                <input type="email" id="email" placeholder="ornek@mail.com" required>
            </div>

            <div class="grid-inputs">
                <div class="input-group">
                    <label class="input-label" for="password">Şifre</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                <div class="input-group">
                    <label class="input-label" for="confirmPassword">Tekrar</label>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;" id="registerBtn">
                Hesap Oluştur
            </button>
        </form>

        <div class="loading-overlay" id="loading">
            <div class="spinner"></div>
            <p style="font-size: 0.8rem; color: var(--text-muted);">Hesabınız hazırlanıyor...</p>
        </div>

        <div class="auth-footer">
            Zaten üye misiniz? <a href="/login">Giriş Yapın</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const registerBtn = document.getElementById('registerBtn');
            const loading = document.getElementById('loading');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');

            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';

            if (password !== confirmPassword) {
                errorMessage.textContent = 'Şifreler eşleşmiyor!';
                errorMessage.style.display = 'block';
                return;
            }

            registerBtn.style.display = 'none';
            loading.style.display = 'flex';

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, username, email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    Swal.fire({
                        icon: 'success',
                        title: 'Kayıt Başarılı!',
                        text: 'Şimdi giriş yapabilirsiniz.',
                        timer: 2000,
                        showConfirmButton: false,
                        background: 'rgba(30, 41, 59, 0.95)',
                        color: '#fff'
                    }).then(() => {
                        window.location.href = '/login';
                    });
                } else {
                    Swal.fire({
                        icon: 'error',
                        title: 'Kayıt Hatası',
                        text: data.error || 'Kayıt sırasında bir hata oluştu.',
                        background: 'rgba(30, 41, 59, 0.95)',
                        color: '#fff'
                    });
                    registerBtn.style.display = 'block';
                    loading.style.display = 'none';
                }
            } catch (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Bağlantı Hatası',
                    text: 'Sunucuya bağlanılamadı.',
                    background: 'rgba(30, 41, 59, 0.95)',
                    color: '#fff'
                });
                registerBtn.style.display = 'block';
                loading.style.display = 'none';
            }
        });

        // Real-time password confirmation validation
        document.getElementById('confirmPassword').addEventListener('input', function () {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            if (confirmPassword && password !== confirmPassword) {
                this.style.borderColor = 'var(--danger)';
            } else {
                this.style.borderColor = '#e2e8f0';
            }
        });
    </script>
</body>

</html>
