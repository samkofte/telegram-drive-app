<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Drive API Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>

<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8 text-gray-800">Telegram Drive API Tester</h1>

        <!-- Config & Auth -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">Ayarlar</h2>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">API URL</label>
                    <input type="text" id="apiUrl" value="http://localhost:8000"
                        class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">Token</label>
                    <input type="text" id="token" placeholder="Bearer Token buraya gelecek"
                        class="mt-1 block w-full rounded-md border-gray-300 bg-gray-50 shadow-sm p-2 border">
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">Giriş Yap</h2>
                <div class="space-y-4">
                    <input type="email" id="loginEmail" placeholder="Email" value="admin@example.com"
                        class="block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    <input type="password" id="loginPass" placeholder="Şifre" value="password"
                        class="block w-full rounded-md border-gray-300 shadow-sm p-2 border">
                    <button onclick="login()"
                        class="w-full bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Giriş Yap</button>
                    <div id="loginStatus" class="text-sm"></div>
                </div>
            </div>
        </div>

        <!-- Main Actions -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- User Info -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">Kullanıcı Bilgileri (/auth/me)</h2>
                <button onclick="getMe()"
                    class="w-full bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 mb-4">Bilgileri
                    Getir</button>
                <div id="userInfo" class="text-sm font-mono overflow-auto h-32 bg-gray-50 p-2 rounded"></div>
            </div>

            <!-- Upload -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">Dosya Yükle (/upload)</h2>
                <input type="file" id="fileInput"
                    class="block w-full text-sm text-gray-500 mb-4 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                <button onclick="uploadFile()"
                    class="w-full bg-indigo-600 text-white px-4 py-2 rounded hover:bg-indigo-700">Yükle</button>
                <div id="uploadStatus" class="mt-2 text-sm"></div>
            </div>

            <!-- Stats -->
            <div class="bg-white p-6 rounded-lg shadow">
                <h2 class="text-xl font-semibold mb-4">Admin İstatistikleri</h2>
                <button onclick="getStats()"
                    class="w-full bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700 mb-4">İstatistikleri
                    Getir</button>
                <div id="statsInfo" class="text-sm font-mono overflow-auto h-32 bg-gray-50 p-2 rounded"></div>
            </div>
        </div>

        <!-- File List -->
        <div class="bg-white p-6 rounded-lg shadow mb-8">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-xl font-semibold">Dosyalarım (/files)</h2>
                <button onclick="getFiles()"
                    class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">Yenile</button>
            </div>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Dosya Adı</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                Boyut</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                İşlemler</th>
                        </tr>
                    </thead>
                    <tbody id="fileTableBody" class="bg-white divide-y divide-gray-200">
                        <!-- Files will be here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Console Log -->
        <div class="bg-gray-800 p-6 rounded-lg shadow text-green-400">
            <h2 class="text-xl font-semibold mb-4 text-white">Console Log</h2>
            <div id="consoleLog" class="font-mono text-sm h-48 overflow-auto"></div>
        </div>
    </div>

    <script>
        // Utils
        const log = (msg, type = 'info') => {
            const el = document.getElementById('consoleLog');
            const time = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-400' : 'text-green-400';
            el.innerHTML += `<div class="${color}">[${time}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
        };

        const getUrl = (path) => {
            let base = document.getElementById('apiUrl').value;
            // Remove trailing slash if exists
            base = base.replace(/\/$/, "");
            return `${base}${path}`;
        };

        const getHeaders = () => {
            const token = document.getElementById('token').value;
            return {
                'Authorization': `Bearer ${token}`
            };
        };

        // Actions
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPass').value;

            try {
                log('Logging in...');
                const res = await axios.post(getUrl('/auth/login'), { email, password });
                document.getElementById('token').value = res.data.access_token;
                document.getElementById('loginStatus').innerHTML = '<span class="text-green-600">Başarılı!</span>';
                log('Login successful. Token saved.');
                getMe();
                getFiles();
            } catch (err) {
                log(`Login failed: ${err.response?.data?.error || err.message}`, 'error');
                document.getElementById('loginStatus').innerHTML = '<span class="text-red-600">Hata!</span>';
            }
        }

        async function getMe() {
            try {
                const res = await axios.get(getUrl('/auth/me'), { headers: getHeaders() });
                document.getElementById('userInfo').innerText = JSON.stringify(res.data, null, 2);
                log('Fetched user info');
            } catch (err) {
                log(`Get Me failed: ${err.message}`, 'error');
            }
        }

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) {
                alert('Lütfen bir dosya seçin');
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                log(`Uploading ${fileInput.files[0].name}... This may take a while for large files.`);
                document.getElementById('uploadStatus').innerText = 'Yükleniyor...';

                const res = await axios.post(getUrl('/upload'), formData, {
                    headers: {
                        ...getHeaders(),
                        'Content-Type': 'multipart/form-data'
                    }
                });

                document.getElementById('uploadStatus').innerHTML = '<span class="text-green-600">Yüklendi!</span>';
                log(`Upload successful: ${res.data.message}`);
                getFiles();
            } catch (err) {
                log(`Upload failed: ${err.response?.data?.error || err.message}`, 'error');
                document.getElementById('uploadStatus').innerHTML = '<span class="text-red-600">Hata!</span>';
            }
        }

        async function getStats() {
            try {
                const res = await axios.get(getUrl('/admin/stats'), { headers: getHeaders() });
                document.getElementById('statsInfo').innerText = JSON.stringify(res.data, null, 2);
                log('Fetched admin stats');
            } catch (err) {
                log(`Get Stats failed: ${err.response?.data?.error || err.message}`, 'error');
            }
        }

        async function getFiles() {
            try {
                const res = await axios.get(getUrl('/files'), { headers: getHeaders() });
                const tbody = document.getElementById('fileTableBody');
                tbody.innerHTML = '';

                res.data.forEach(file => {
                    const row = `
                        <tr>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${file.filename}</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${(file.file_size / 1024 / 1024).toFixed(2)} MB</td>
                            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium space-x-2">
                                <a href="${getUrl(`/download/${file.file_id}`)}" target="_blank" class="text-indigo-600 hover:text-indigo-900">İndir</a>
                                <a href="${getUrl(`/stream/${file.file_id}`)}" target="_blank" class="text-green-600 hover:text-green-900">Stream</a>
                                <button onclick="deleteFile('${file.file_id}')" class="text-red-600 hover:text-red-900">Sil</button>
                            </td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
                log(`Fetched ${res.data.length} files`);
            } catch (err) {
                log(`Get Files failed: ${err.message}`, 'error');
            }
        }

        async function deleteFile(id) {
            if (!confirm('Emin misiniz?')) return;
            try {
                await axios.delete(getUrl(`/files/${id}`), { headers: getHeaders() });
                log(`Deleted file ${id}`);
                getFiles();
            } catch (err) {
                log(`Delete failed: ${err.message}`, 'error');
            }
        }
    </script>
</body>

</html>
